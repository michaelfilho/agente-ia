<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

  <title>AGENTE IA</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

  <style>

    :root{
      --green: #239a4b;
      --green-dark: #1b7c3d;
      --gold: #efc33c;
      --bg: #f3f5f8;
      --text: #243041;
      --white: #ffffff;
      --border: #e7ebf0;
      --bot: #ffffff;
      --shadow: 0 10px 30px rgba(22, 35, 54, 0.08);
    }

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
    }

    html, body{
      min-height:100%;
    }

    body{
      font-family:'Inter', sans-serif;
      background:var(--bg);
      color:var(--text);
      line-height:1.6;
    }

    .page{
      min-height:100vh;
      display:flex;
      flex-direction:column;
    }

    .header{
      background:var(--green);
      color:var(--white);
      padding:32px 0 44px;
      position:relative;
      box-shadow:inset 0 -1px 0 rgba(255,255,255,0.08);
    }

    .header::after{
      content:"";
      position:absolute;
      left:0;
      right:0;
      bottom:0;
      height:4px;
      background:var(--gold);
    }

    .container{
      width:min(1200px, calc(100% - 32px));
      margin:0 auto;
    }

    .brand{
      font-size:28px;
      font-weight:700;
      letter-spacing:0.02em;
      text-transform:uppercase;
      margin-bottom:42px;
    }

    .subtitle{
      font-size:17px;
      line-height:1.5;
      max-width:820px;
      opacity:0.95;
    }

    .chat-shell{
      flex:1;
      display:flex;
      flex-direction:column;
      padding:18px 0 0;
    }

    .chat-window{
      width:min(900px, calc(100% - 32px));
      margin:0 auto;
      flex:1;
      display:flex;
      flex-direction:column;
      gap:18px;
      padding-bottom:18px;
    }

    .messages-panel{
      flex:1;
      overflow-y:auto;
      padding:10px 0 6px;
    }

    .message-row{
      display:flex;
      margin:18px 0;
    }

    .message-row.bot{
      justify-content:flex-start;
    }

    .message-row.user{
      justify-content:flex-end;
    }

    .bubble{
      max-width:min(640px, 84%);
      padding:16px 18px;
      border-radius:14px;
      font-size:17px;
      line-height:1.45;
      box-shadow:var(--shadow);
      border:1px solid rgba(231, 235, 240, 0.8);
      background:var(--white);
      color:var(--text);
    }

    .message-row.user .bubble{
      background:var(--green);
      color:var(--white);
      border-color:transparent;
      box-shadow:none;
      border-top-right-radius:10px;
    }

    .message-row.bot .bubble{
      border-top-left-radius:10px;
    }

    .typing{
      display:inline-flex;
      align-items:center;
      gap:8px;
      font-size:15px;
      color:#6a7484;
      margin:2px 0 18px 18px;
    }

    .typing::before{
      content:"";
      width:8px;
      height:8px;
      border-radius:50%;
      background:var(--green);
      box-shadow:12px 0 0 rgba(35, 154, 75, 0.55), 24px 0 0 rgba(35, 154, 75, 0.3);
      animation: pulseDots 1.2s infinite ease-in-out;
    }

    @keyframes pulseDots{
      0%, 100%{ transform:translateY(0); opacity:0.65; }
      50%{ transform:translateY(-2px); opacity:1; }
    }

    .composer-wrap{
      position:sticky;
      bottom:0;
      background:linear-gradient(180deg, rgba(243,245,248,0) 0%, rgba(243,245,248,0.92) 28%, rgba(243,245,248,1) 100%);
      padding:14px 0 18px;
    }

    .composer{
      width:min(100%, 1000px);
      margin:0 auto;
      background:var(--white);
      border:1px solid var(--border);
      border-radius:0;
      box-shadow:0 -1px 0 rgba(255,255,255,0.65), 0 0 0 1px rgba(231,235,240,0.25);
      display:flex;
      align-items:center;
      gap:12px;
      padding:18px 18px 18px 20px;
    }

    .composer input{
      flex:1;
      border:none;
      outline:none;
      background:transparent;
      font-size:18px;
      color:var(--text);
      min-width:0;
    }

    .composer input::placeholder{
      color:#91a0b3;
    }

    .send-btn{
      width:42px;
      height:42px;
      border:none;
      background:transparent;
      color:#c5ced9;
      cursor:pointer;
      display:inline-flex;
      align-items:center;
      justify-content:center;
      transition:transform 0.2s ease, color 0.2s ease;
      padding:0;
      flex:0 0 auto;
    }

    .send-btn:hover{
      color:var(--green);
      transform:translateX(1px);
    }

    .send-btn svg{
      width:30px;
      height:30px;
      display:block;
      fill:currentColor;
    }

    @media(max-width:768px){

      .header{
        padding:24px 0 34px;
      }

      .brand{
        font-size:22px;
        margin-bottom:28px;
      }

      .subtitle{
        font-size:15px;
      }

      .chat-shell{
        padding-top:14px;
      }

      .chat-window{
        width:calc(100% - 20px);
      }

      .bubble{
        max-width:92%;
        font-size:16px;
      }

      .composer{
        padding:14px 14px 14px 16px;
      }

      .composer input{
        font-size:16px;
      }

    }

  </style>
</head>
<body>

  <div class="page">

    <header class="header">
      <div class="container">
        <div class="brand">AGENTE IA</div>
        <div class="subtitle">
          Desenvolvido para a Secretaria de Finanças, Planejamento e Desenvolvimento Econômico
        </div>
      </div>
    </header>

    <main class="chat-shell">
      <div class="chat-window">
        <div class="messages-panel" id="chatMessages" aria-live="polite"></div>

        <div class="composer-wrap">
          <div class="composer">
            <input
              type="text"
              id="messageInput"
              placeholder="Type your question..."
              autocomplete="off"
            />

            <button class="send-btn" type="button" onclick="sendMessage()" aria-label="Enviar mensagem">
              <svg viewBox="0 0 24 24" aria-hidden="true">
                <path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z" />
              </svg>
            </button>
          </div>
        </div>
      </div>
    </main>

  </div>

  <script>

    const API_URL = "https://ia-cit.app.n8n.cloud/webhook/perguntas";

    let sessionId = crypto.randomUUID();

    const chatMessages = document.getElementById("chatMessages");
    const messageInput = document.getElementById("messageInput");

    function addMessage(text, sender){

      const wrapper = document.createElement("div");

      wrapper.classList.add("message-row", sender);

      const bubble = document.createElement("div");

      bubble.classList.add("bubble");

      bubble.innerText = text;

      wrapper.appendChild(bubble);

      chatMessages.appendChild(wrapper);

      chatMessages.scrollTop = chatMessages.scrollHeight;

    }

    function userMessage(text){
      addMessage(text, "user");
    }

    function botMessage(text){
      addMessage(text, "bot");
    }

    function showTyping(){

      const typing = document.createElement("div");

      typing.id = "typing";

      typing.classList.add("typing");

      typing.innerText = "Digitando";

      chatMessages.appendChild(typing);

      chatMessages.scrollTop = chatMessages.scrollHeight;

    }

    function removeTyping(){

      const typing = document.getElementById("typing");

      if(typing){
        typing.remove();
      }

    }

    async function sendMessage(){

      const text = messageInput.value.trim();

      if(!text) return;

      userMessage(text);

      messageInput.value = "";

      showTyping();

      try{

        const controller = new AbortController();
        const timeoutId = setTimeout(() => controller.abort(), 90000); // 90 segundos

        const response = await fetch(API_URL, {

          method:"POST",

          headers:{
            "Content-Type":"application/json"
          },

          signal: controller.signal,

          body: JSON.stringify({

            canal:"web",
            sessao:sessionId,
            pergunta:text,
            timestamp:new Date().toISOString()

          })

        });

        clearTimeout(timeoutId);

        removeTyping();

        if(!response.ok){
          botMessage("Erro ao conectar ao servidor.");
          return;
        }

        const data = await response.json();

        if(data.resposta){
          botMessage(data.resposta);
        }else{
          botMessage("Resposta vazia do servidor.");
        }

      }catch(error){

        removeTyping();

        if(error.name === "AbortError"){
          botMessage("A resposta demorou muito. O Kiko ainda está processando, tente novamente em instantes.");
        } else {
          botMessage("Erro de conexão. Verifique sua internet e tente novamente.");
        }

        console.error(error);

      }

    }

    messageInput.addEventListener("keypress", function(e){

      if(e.key === "Enter"){
        sendMessage();
      }

    });

    // Exibe mensagem de boas-vindas ao carregar a página (sem persistência)
    botMessage("Olá! Sou o Kiko, o Agente IA da Prefeitura de Tarumã. Estou aqui para ajudar você a encontrar o que precisa de forma rápida e simples!");
    botMessage("Como posso te ajudar hoje? 😊");

  </script>

</body>
</html>
